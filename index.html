<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>투자 포트폴리오 대시보드</title>

  <link rel="manifest" href="./manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="자산 관리">
  <link rel="apple-touch-icon" href="./icon-192.png">

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script src="https://cdn.tailwindcss.com"></script>

<script>
    window.APP_CONFIG = window.APP_CONFIG || { version: "8.0", status: "ready" };
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
    body { font-family: 'Inter', 'Noto Sans KR', sans-serif; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #020617; }
    ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 999px; }
    ::-webkit-scrollbar-thumb:hover { background: #334155; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // 포트폴리오 배당/카테고리 템플릿 DB (시트에 없는 데이터 보완용)
    const TICKER_DB = {
      '379800': { category: '주식(미국)', dividendMonth: '매월', dividendAmount: 35, dividendType: 'end' },
      '446720': { category: '주식(미국)', dividendMonth: '매월', dividendAmount: 32, dividendType: 'mid' },
      '381170': { category: '주식(미국)', dividendMonth: '분기', dividendAmount: 15, dividendType: 'end' },
      '426030': { category: '주식(미국)', dividendMonth: '없음', dividendAmount: 0, dividendType: 'end' },
      '453850': { category: '채권', dividendMonth: '매월', dividendAmount: 51, dividendType: 'end' },
      '273130': { category: '안전/현금', dividendMonth: '없음', dividendAmount: 0, dividendType: 'end' },
      '411920': { category: '대체자산/리츠', dividendMonth: '없음', dividendAmount: 0, dividendType: 'end' },
      '458760': { category: '주식(미국)', dividendMonth: '매월', dividendAmount: 85, dividendType: 'end' },
      '0118Z0': { category: '주식(미국)', dividendMonth: '매월', dividendAmount: 40, dividendType: 'end' },
      '367380': { category: '주식(미국)', dividendMonth: '분기', dividendAmount: 20, dividendType: 'end' },
      '390390': { category: '주식(미국)', dividendMonth: '분기', dividendAmount: 25, dividendType: 'end' },
      '484880': { category: '주식(국내)', dividendMonth: '매월', dividendAmount: 45, dividendType: 'mid' },
      '474220': { category: '주식(미국)', dividendMonth: '매월', dividendAmount: 110, dividendType: 'mid' },
      '395160': { category: '주식(미국)', dividendMonth: '분기', dividendAmount: 15, dividendType: 'end' },
      '360750': { category: '주식(미국)', dividendMonth: '분기', dividendAmount: 30, dividendType: 'end' }
    };
    
    const getExtraInfo = (ticker) => TICKER_DB[ticker] || { category: '기타/미분류', dividendMonth: '없음', dividendAmount: 0, dividendType: 'end' };

    const CATEGORIES = ['주식(미국)', '주식(국내)', '채권', '대체자산/리츠', '안전/현금'];
    const ACCOUNTS = ['ISA', '연금저축1', '연금저축2', '연금저축3', 'IRP', '금현물/기타'];
    const CATEGORY_COLORS = { '주식(미국)': '#10B981', '주식(국내)': '#3B82F6', '채권': '#F59E0B', '대체자산/리츠': '#8B5CF6', '안전/현금': '#6B7280' };
    const ACCOUNT_BADGES = { 'ISA': 'bg-teal-900/60 text-teal-300 border-teal-500/30', '연금저축1': 'bg-blue-900/60 text-blue-300 border-blue-500/30', '연금저축2': 'bg-sky-900/60 text-sky-300 border-sky-500/30', '연금저축3': 'bg-indigo-900/60 text-indigo-300 border-indigo-500/30', 'IRP': 'bg-purple-900/60 text-purple-300 border-purple-500/30', '금현물/기타': 'bg-amber-900/60 text-amber-300 border-amber-500/30' };

    function App() {
      // 상태 관리
      const [assets, setAssets] = useState([]);
// [추가할 부분] 시트의 계좌명들을 긁어와서 자동으로 배열(탭)을 완성합니다!
  const ACCOUNTS = useMemo(() => {
    const accs = [...new Set(assets.map(a => a.account))].filter(Boolean);
    const defaultAccs = ['ISA', '연금저축1', '연금저축2', '연금저축3', 'IRP', '금현물/기타'];
    return accs.length > 0 ? accs : defaultAccs;
  }, [assets]);

      const [targetWeights, setTargetWeights] = useState({ '주식(미국)': 45, '주식(국내)': 5, '채권': 25, '대체자산/리츠': 10, '안전/현금': 15 });
      const [snapshots, setSnapshots] = useState([]);
     const [gasUrl, setGasUrl] = useState(() => {
  if (typeof APP_URL !== 'undefined' && APP_URL) {
    return APP_URL;
  }
  return localStorage.getItem('my_portfolio_gas_url') || '';
});
      const [driveSyncStatus, setDriveSyncStatus] = useState('disconnected');
      
      const [activeTab, setActiveTab] = useState('dashboard');
      const [editingAsset, setEditingAsset] = useState(null);
      const [showAddModal, setShowAddModal] = useState(false);
      const [showBackupCenter, setShowBackupCenter] = useState(false);
      const [mobileBackupInput, setMobileBackupInput] = useState('');
      const [confirmDialog, setConfirmDialog] = useState({ isOpen: false, message: '', onConfirm: null });
      const [isSyncingPrice, setIsSyncingPrice] = useState(false);
      
      const [searchQuery, setSearchQuery] = useState('');
      const [selectedAccountFilter, setSelectedAccountFilter] = useState('전체');
      const [selectedAccountDetailTab, setSelectedAccountDetailTab] = useState('ISA');
      const [newCapital, setNewCapital] = useState(0);
      const [notification, setNotification] = useState(null);

      const [calcInit, setCalcInit] = useState(50000000);
      const [calcMonthly, setCalcMonthly] = useState(1000000);
      const [calcYears, setCalcYears] = useState(20);
      const [calcRate, setCalcRate] = useState(7);
      const [trendPeriod, setTrendPeriod] = useState(12);
      const [hoveredPoint, setHoveredPoint] = useState(null);
const [withdrawalRate, setWithdrawalRate] = useState(4);

      // 로컬 스토리지 초기 로드
      useEffect(() => {
        const localAssets = localStorage.getItem('my_portfolio_v8');
        const localWeights = localStorage.getItem('my_target_weights_v8');
        const localSnapshots = localStorage.getItem('my_snapshots_v8');
        if (localAssets) setAssets(JSON.parse(localAssets));
        if (localWeights) setTargetWeights(JSON.parse(localWeights));
        if (localSnapshots) setSnapshots(JSON.parse(localSnapshots));
      }, []);

    // 로컬 스토리지에 저장 (불러올 때와 똑같은 이름으로 저장)
      const saveToLocal = (newAssets, newWeights, newSnaps) => {
        localStorage.setItem('my_portfolio_v8', JSON.stringify(newAssets));
        localStorage.setItem('my_target_weights_v8', JSON.stringify(newWeights));
        localStorage.setItem('my_snapshots_v8', JSON.stringify(newSnaps));
      };

     const triggerNotification = (message, type = 'success') => {
        setNotification({ message, type });
        setTimeout(() => setNotification(null), 3500);
      };

      const openConfirm = (message, onConfirm) => {
        setConfirmDialog({ isOpen: true, message, onConfirm });
      };

    // [V8.0 핵심 엔진] 구글 시트에서 데이터 읽어오기 (분류 및 배당 정보 정상 연동 패치)
      const handleLoadFromSheet = async () => {
        if (!gasUrl) {
          triggerNotification('구글 Apps Script 웹 앱 URL을 먼저 입력해주세요.', 'error');
          setShowBackupCenter(true); return;
        }
        setDriveSyncStatus('connecting');
        try {
          const res = await fetch(gasUrl);
          const rawData = await res.json();
          
          const confRes = await fetch(`${gasUrl}?action=load_config`);
          const confData = await confRes.json();

          if (Array.isArray(rawData)) {
            const parsedAssets = rawData.map((row, index) => {
              // 00 잘림 방지 (6자리 보정)
              let cleanTicker = String(row.ticker).replace('KRX:', '').trim().toUpperCase();
              if (/^\d+$/.test(cleanTicker)) cleanTicker = cleanTicker.padStart(6, '0');
              
              // 1. 한글 계좌명 매칭 (ACCOUNTS 배열에 있는 명칭인지 확인)
              const accKey = row.account ? String(row.account).trim() : '기타';
              
              // 2. 완성된 자산 객체 반환 (★ 시트에서 넘어온 분류 및 배당 정보 우선 적용, 없을 때만 DB 참조)
              const backupInfo = getExtraInfo(cleanTicker);
              
            // Apps Script 백엔드가 보낸 주기 정보를 dividendMonth로 통일 흡수
              const sPeriod = row.dividendPeriod || row.dividendMonth;

              return {
                id: `sheet-${Date.now()}-${index}`,
                account: accKey,
                name: String(row.name).trim(),
                ticker: cleanTicker,
                quantity: Number(row.quantity) || 0,
                price: Number(row.price) || 0,
                currentPrice: (row.currentPrice === 'N/A' || !row.currentPrice) ? 'N/A' : Number(row.currentPrice),
                category: row.category ? String(row.category).trim() : backupInfo.category,
                // 이 변수명이 dividendMonth여야 대시보드 그래프 엔진이 정상 작동합니다.
                dividendMonth: sPeriod ? String(sPeriod).trim() : backupInfo.dividendMonth,
                dividendAmount: row.dividendAmount !== undefined ? Number(row.dividendAmount) || 0 : backupInfo.dividendAmount,
                dividendType: row.dividendType ? String(row.dividendType).trim() : backupInfo.dividendType
              };
            }); // map 함수 종료

            // [추가된 버그 수정 핵심 로직] 구글 시트 백업본에서 넘어온 날짜 중 왜곡된 데이터 강제 교정
            let parsedSnapshots = [];
            if (confData.snapshots && Array.isArray(confData.snapshots)) {
              const today = new Date();
              const currentMonthKey = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}`;
              
              parsedSnapshots = confData.snapshots.map(s => {
                if (s.memo && s.memo.includes('실시간 자동 결산') && s.date !== currentMonthKey) {
                  return { 
                    ...s, 
                    date: currentMonthKey, 
                    memo: `${currentMonthKey} 실시간 자동 결산` 
                  };
                }
                return s;
              });
            }

            setAssets(parsedAssets);
            if (confData.targetWeights) setTargetWeights(confData.targetWeights);
            
            const finalSnaps = parsedSnapshots.length > 0 ? parsedSnapshots : snapshots;
            setSnapshots(finalSnaps);
            
            saveToLocal(parsedAssets, confData.targetWeights || targetWeights, finalSnaps);
            setDriveSyncStatus('connected');
            triggerNotification('구글 시트 연동 완료! 모든 자산을 불러왔습니다. 🎉');
            setShowBackupCenter(false);
          } else {
            setDriveSyncStatus('error'); triggerNotification('시트 데이터 형식이 올바르지 않습니다.', 'error');
          }
        } catch (err) {
          setDriveSyncStatus('error'); console.error(err);
          triggerNotification('연결 실패. 배포 권한(모든 사람)을 확인해주세요.', 'error');
        }
      };

      // V8.0 개별 행 수정(update) / 신규 추가(append) API 호출
      const syncSingleRow = async (asset, isNew = false) => {
  if (!gasUrl) return;
  setDriveSyncStatus('syncing');
  try {
    const payload = { 
      action: isNew ? 'append' : 'update', 
      account: asset.account, 
      ticker: asset.ticker, 
      name: asset.name, 
      quantity: asset.quantity, 
      price: asset.price, 
      currentPrice: asset.currentPrice,
      // 🔥 구글 시트 백엔드로 배당 데이터 전송 추가
      dividendMonth: asset.dividendMonth,
      dividendAmount: asset.dividendAmount,
      dividendType: asset.dividendType
    };
    const res = await fetch(gasUrl, { method: 'POST', body: JSON.stringify(payload) });
    const result = await res.json();
    if (result.status === 'success') setDriveSyncStatus('connected');
    else setDriveSyncStatus('error');
  } catch (e) { setDriveSyncStatus('error'); }
};

      // V8.0 개별 행 삭제 API 호출
      const syncDeleteRow = async (asset) => {
        if (!gasUrl) return;
        setDriveSyncStatus('syncing');
        try {
          const payload = { action: 'delete', account: asset.account, ticker: asset.ticker };
          const res = await fetch(gasUrl, { method: 'POST', body: JSON.stringify(payload) });
          const result = await res.json();
          if (result.status === 'success') setDriveSyncStatus('connected');
          else setDriveSyncStatus('error');
        } catch (e) { setDriveSyncStatus('error'); }
      };

     // 전체 덮어쓰기 (수동 저장 및 일괄 갱신 시) - 배당 주기 명칭 호환 패치
      const triggerCloudSyncAll = async (nextAssets, nextWeights, nextSnaps) => {
        saveToLocal(nextAssets, nextWeights, nextSnaps);
        if (gasUrl) {
          setDriveSyncStatus('syncing');
          try {
            // 대시보드 전용 'dividendMonth' 변수명을 시트 백엔드 수신 규격인 'dividendPeriod'로 변환 매핑
            const mappedAssetsForSheet = nextAssets.map(a => ({
              account: a.account, 
              ticker: a.ticker, 
              name: a.name, 
              quantity: a.quantity, 
              price: a.price, 
              currentPrice: a.currentPrice,
              category: a.category, 
              dividendPeriod: a.dividendMonth, // 여기서 이름을 맞추어 줍니다!
              dividendAmount: a.dividendAmount, 
              dividendType: a.dividendType
            }));
            
            const res = await fetch(gasUrl, { 
              method: 'POST', 
              body: JSON.stringify({ action: 'save_all', payload: { assets: mappedAssetsForSheet, targetWeights: nextWeights, snapshots: nextSnaps } }) 
            });
            const result = await res.json();
            if (result.status === 'success') setDriveSyncStatus('connected');
            else throw new Error();
          } catch (e) { setDriveSyncStatus('error'); }
        }
      };

      const handleManualSave = () => {
        triggerCloudSyncAll(assets, targetWeights, snapshots);
        triggerNotification('구글 시트 전체 동기화 및 로컬 백업이 완료되었습니다!', 'success');
      };

      const handleSaveAsset = (e) => {
  e.preventDefault();
  const formData = new FormData(e.target);
  
  // 티커 처리 로직
  let rawTicker = (formData.get('ticker') || '000000').replace('KRX:', '').trim().toUpperCase();
  if (/^\d+$/.test(rawTicker)) rawTicker = rawTicker.padStart(6, '0');
  
  // 데이터 객체 생성 (배당 필드 명시적으로 추가)
  const assetData = {
    id: editingAsset ? editingAsset.id : `sheet-${Date.now()}`, 
    account: formData.get('account'), 
    name: formData.get('name'), 
    ticker: rawTicker,
    quantity: Number(formData.get('quantity')) || 0, 
    price: Number(formData.get('price')) || 0, 
    currentPrice: Number(formData.get('currentPrice')) || 0,
    category: formData.get('category'),
    // 🔥 아래 필드들을 formData에서 정확히 가져와야 합니다!
    dividendMonth: formData.get('dividendMonth'), 
    dividendAmount: Number(formData.get('dividendAmount')) || 0, 
    dividendType: formData.get('dividendType'), 
    memo: formData.get('memo') || ''
  };

  let nextAssets;
  if (editingAsset) {
    nextAssets = assets.map(a => a.id === editingAsset.id ? assetData : a);
    triggerNotification('자산 정보가 수정되어 시트에 반영됩니다.');
    syncSingleRow(assetData, false);
  } else {
    nextAssets = [...assets, assetData];
    triggerNotification('새 자산이 시트에 추가되었습니다.');
    syncSingleRow(assetData, true);
  }
  
  setAssets(nextAssets); 
  saveToLocal(nextAssets, targetWeights, snapshots);
  setEditingAsset(null); 
  setShowAddModal(false);
};

      const handleDeleteAsset = (asset) => {
        openConfirm(`[${asset.name}] 자산을 삭제하시겠습니까?`, () => {
          const nextAssets = assets.filter(a => a.id !== asset.id);
          setAssets(nextAssets); saveToLocal(nextAssets, targetWeights, snapshots);
          syncDeleteRow(asset);
          triggerNotification('자산이 삭제되었습니다.', 'error');
        });
      };

      const handleBackupSheet = async () => {
        if (!gasUrl) return alert("GAS 웹 앱 URL을 먼저 입력해주세요.");
        setDriveSyncStatus('syncing');
        try {
          const res = await fetch(gasUrl, { method: 'POST', body: JSON.stringify({ action: 'backup' }) });
          const result = await res.json();
          if(result.status === 'backup_complete') {
            alert(`백업 성공!\n드라이브에 저장된 파일명: ${result.fileName}`);
            setDriveSyncStatus('connected');
          }
        } catch (e) { alert("백업 중 오류가 발생했습니다."); setDriveSyncStatus('error'); }
      };

      // 수정된 portfolioStats 계산 로직
const portfolioStats = useMemo(() => {
  let totalInvested = 0, totalCurrent = 0, totalAnnualDividend = 0, midMonthDividend = 0, endMonthDividend = 0;
  assets.forEach(asset => {
    const invested = Number(asset.quantity) * Number(asset.price);
    const current = Number(asset.quantity) * (asset.currentPrice === 'N/A' ? Number(asset.price) : Number(asset.currentPrice));
    totalInvested += invested; totalCurrent += current;
    
    let annualDiv = 0;
    if (asset.dividendMonth === '매월') { 
      annualDiv = Number(asset.dividendAmount) * 12 * Number(asset.quantity); 
      if (asset.dividendType === 'mid') midMonthDividend += Number(asset.dividendAmount) * Number(asset.quantity); 
      else endMonthDividend += Number(asset.dividendAmount) * Number(asset.quantity); 
    } 
    else if (asset.dividendMonth === '분기') { 
      annualDiv = Number(asset.dividendAmount) * 4 * Number(asset.quantity); 
      if (asset.dividendType === 'mid') midMonthDividend += (Number(asset.dividendAmount) * Number(asset.quantity)) / 3; 
      else endMonthDividend += (Number(asset.dividendAmount) * Number(asset.quantity)) / 3; 
    }
    // 👇 반기 배당일 경우 월 평균을 구하기 위해 6으로 나누어 합산합니다.
    else if (asset.dividendMonth === '반기') { 
      annualDiv = Number(asset.dividendAmount) * 2 * Number(asset.quantity); 
      if (asset.dividendType === 'mid') midMonthDividend += (Number(asset.dividendAmount) * Number(asset.quantity)) / 6; 
      else endMonthDividend += (Number(asset.dividendAmount) * Number(asset.quantity)) / 6; 
    } 
    // 👇 연간 배당일 경우 월 평균을 구하기 위해 12로 나누어 합산합니다.
    else if (asset.dividendMonth === '연간') { 
      annualDiv = Number(asset.dividendAmount) * Number(asset.quantity); 
      if (asset.dividendType === 'mid') midMonthDividend += (Number(asset.dividendAmount) * Number(asset.quantity)) / 12; 
      else endMonthDividend += (Number(asset.dividendAmount) * Number(asset.quantity)) / 12; 
    }
    totalAnnualDividend += annualDiv;
  });
  
  const totalProfit = totalCurrent - totalInvested;
  const profitRate = totalInvested > 0 ? (totalProfit / totalInvested) * 100 : 0;
  const dividendYield = totalCurrent > 0 ? (totalAnnualDividend / totalCurrent) * 100 : 0;
  return { totalInvested, totalCurrent, totalProfit, profitRate, totalAnnualDividend, dividendYield, midMonthDividend, endMonthDividend };
}, [assets]);

    // 스냅샷 엔진 (기준 연월 +1 버그 수정 및 시트 불러오기 시 유지 로직 보완)
      useEffect(() => {
        if (portfolioStats.totalCurrent === 0) return;
        
        // ★ 날짜 가드 수정: getMonth()에 반드시 +1을 더해 5월이 정상 출력되도록 보정
        const today = new Date();
        const currentMonthKey = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}`;
        
        setSnapshots(prev => {
          // 구글 시트 백업 등에서 덮어쓰기 되더라도 현재 월 실시간 스냅샷이 누락되지 않도록 방어
          const existingIdx = prev.findIndex(s => s.date === currentMonthKey);
          const newSnapshotData = { 
            id: existingIdx >= 0 ? prev[existingIdx].id : `s-auto-${currentMonthKey}`, 
            date: currentMonthKey, 
            total: portfolioStats.totalCurrent,
